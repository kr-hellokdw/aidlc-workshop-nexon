spring:
  application:
    name: table-order
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

file:
  upload-dir: ./uploads/images

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyDoNotUseInProduction2024}
  access-expiration: 57600000
  refresh-expiration: 86400000

sse:
  timeout: 1800000
  heartbeat-interval: 30000

login:
  max-attempts: 5
  block-duration-minutes: 15
