version: '3.8'

# 개발용 - MySQL만 실행
# 사용법: docker compose -f docker-compose.dev.yml up -d

services:
  mysql:
    image: mysql:8.0
    container_name: tableorder-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: tableorder
      MYSQL_USER: tableorder
      MYSQL_PASSWORD: tableorder1234
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql-data:
